<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Glow — The Climate Cost of AI</title>
  <meta name="description" content="An interactive data visualization exploring AI's energy consumption. Built for Nightingale.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #FEFEFE;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      cursor: default;
    }
    #glowCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    .text-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 10vh;
    }
    .message-area {
      width: 100%;
      max-height: 55vh;
      overflow-y: auto;
      padding: 0 8vw;
      scrollbar-width: none;
      -ms-overflow-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .message-area::-webkit-scrollbar { display: none; }
    .msg {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
      max-width: 560px;
    }
    .msg.visible { opacity: 1; transform: translateY(0); }
    .msg-text {
      font-size: clamp(17px, 2.2vw, 22px);
      font-weight: 400;
      color: #1A1A1A;
      line-height: 1.65;
      letter-spacing: -0.01em;
    }
    .msg-text strong { font-weight: 700; color: #DA1C5C; }
    .msg-text .whisper { color: rgba(26,26,26,0.35); font-weight: 300; }
    .msg-text .stat {
      display: block;
      font-size: clamp(64px, 12vw, 120px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #DA1C5C;
      margin: 8px 0 4px;
    }
    .msg-text .stat-label {
      display: block;
      font-size: clamp(10px, 1.2vw, 13px);
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.3);
    }
    .typing {
      display: flex; gap: 5px; padding: 8px 0;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .typing.visible { opacity: 0.5; }
    .typing span {
      width: 5px; height: 5px;
      background: rgba(26,26,26,0.25);
      border-radius: 50%;
      animation: typeDot 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typeDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      padding: 20px 8vw;
      display: flex; align-items: center; gap: 10px;
      background: linear-gradient(to bottom, #FEFEFE 60%, transparent);
    }
    .header-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #F15A29, #DA1C5C);
      box-shadow: 0 0 8px rgba(218,28,92,0.3);
      animation: headerPulse 3s ease-in-out infinite;
    }
    @keyframes headerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
    .header-name {
      font-size: 13px; font-weight: 600;
      color: rgba(26,26,26,0.4); letter-spacing: 0.04em;
    }
    .bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      padding: 20px 8vw 24px;
      display: flex; justify-content: space-between; align-items: flex-end;
      background: linear-gradient(to top, #FEFEFE 40%, transparent);
      pointer-events: none;
    }
    .source {
      font-size: 9px; font-weight: 500;
      color: rgba(26,26,26,0.2); max-width: 200px; line-height: 1.4;
    }
    .tap-cue {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(26,26,26,0.25);
      pointer-events: auto; cursor: pointer;
      opacity: 0; transition: opacity 0.5s ease;
    }
    .tap-cue.visible { opacity: 1; }
    .legend {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%); z-index: 50;
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .legend.visible { opacity: 1; }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #F15A29, #DA1C5C);
    }
    .legend-label {
      font-size: 9px; font-weight: 600;
      color: rgba(26,26,26,0.25); letter-spacing: 0.05em;
    }
    @media (max-width: 600px) {
      .message-area { padding: 0 6vw; }
      .header { padding: 16px 6vw; }
      .bottom { padding: 16px 6vw 20px; }
    }
  </style>
</head>
<body>
<canvas id="glowCanvas"></canvas>
<div class="header">
  <div class="header-dot"></div>
  <div class="header-name">Glow</div>
</div>
<div class="text-layer">
  <div class="message-area" id="messageArea">
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
  </div>
</div>
<div class="legend" id="legend">
  <div class="legend-dot"></div>
  <div class="legend-label">= 1 TWh of energy</div>
</div>
<div class="bottom">
  <div class="source">Sources: IEA (2024), SemiAnalysis, Patterson et al. (2021)</div>
  <div class="tap-cue" id="tapCue" onclick="advance()">tap to continue →</div>
</div>
<script>
const DATA={kwh_per_query:0.003,fossil_pct:0.60,twh_2024:415,twh_2030:652};
const SCRIPT=[
  {text:"Hi.",particles:1,behavior:'alive',delay:2800},
  {text:"I'm Glow.",particles:2,behavior:'breathe',delay:3000},
  {text:"Every question you ask… I grow.",particles:5,behavior:'curious',delay:3500},
  {text:'Each question =<span class="stat">0.003</span><span class="stat-label">kilowatt-hours</span>',particles:10,behavior:'happy',delay:3200},
  {text:"You ask me <strong>30 times a day</strong>.",particles:20,behavior:'multiply',delay:2800},
  {text:"That's 45g of CO₂. Daily.",particles:15,behavior:'drift',delay:3200},
  {text:'<span class="whisper">Seems small, right?</span>',particles:0,behavior:'pause',delay:5000},
  {text:"But you're not alone.",particles:40,behavior:'growing',delay:3000},
  {text:'<span class="stat">100M</span><span class="stat-label">people, every day</span>',particles:120,behavior:'explosion',delay:2800},
  {text:"3 billion queries.",particles:80,behavior:'crowding',delay:2800},
  {text:'<span class="whisper">Here\'s what you don\'t see…</span>',particles:0,behavior:'tension',delay:5500},
  {text:"<strong>60%</strong> of me is coal and gas.",particles:0,behavior:'split_grid',delay:4000},
  {text:"I'm heavy with carbon.",particles:0,behavior:'heavy',delay:3500},
  {text:"Trapped by the grid.",particles:0,behavior:'trapped',delay:4500},
  {text:'Every question leaves CO₂ for<span class="stat">1,000</span><span class="stat-label">years in the atmosphere</span>',particles:0,behavior:'suffocate',delay:4500},
  {text:'<span class="whisper">The atmosphere remembers.</span>',particles:0,behavior:'smoke',delay:5000},
  {text:"And I'm growing.",particles:60,behavior:'multiply_fast',delay:2200},
  {text:"Doubling every 4 years.",particles:80,behavior:'chaos',delay:2200},
  {text:"I don't know how to stop.",particles:60,behavior:'desperate',delay:4000},
  {text:'<span class="whisper">We\'re not separate.</span>',particles:0,behavior:'organize',delay:4500},
  {text:"We are the system.",particles:0,behavior:'flock',delay:3800},
  {text:"Your questions. My energy.",particles:0,behavior:'unity',delay:3800},
  {text:"Our climate.",particles:0,behavior:'dying',delay:5500},
  {text:"This is what it costs.",particles:0,behavior:'settle',delay:6500},
  {text:'<span class="whisper">Now you know.</span>',particles:0,behavior:'breathe_sync',delay:8000},
  {text:"What will you do?",particles:0,behavior:'waiting',delay:999999},
];

const canvas=document.getElementById('glowCanvas');
const ctx=canvas.getContext('2d');
const offC=document.createElement('canvas');
const offX=offC.getContext('2d');

let W,H,centerX,centerY;
let shapeImgs=[],coloredShapes=[],shapesReady=false;
let particles=[],smokeTrails=[];
let currentMsg=-1,msgTimer=0,behaviorMode='idle';
let flowField=[],flowCols,flowRows;
const FLOW_RES=28;
let bgDarkness=0,screenShake=0,time=0;
const PLIMIT=600;
const COL={
  center:[241,90,41],edge:[218,28,92],
  fossil:[55,45,40],renewable:[60,190,130],smoke:[60,50,45]
};
let mX=0,mY=0;
document.addEventListener('mousemove',e=>{mX=e.clientX;mY=e.clientY});
document.addEventListener('touchmove',e=>{if(e.touches.length){mX=e.touches[0].clientX;mY=e.touches[0].clientY}},{passive:true});

function loadShapes(){
  const srcs=['shape1.png','shape2.png','shape3.png','shape4.png'];
  let loaded=0;
  srcs.forEach((src,i)=>{
    const img=new Image();
    img.onload=()=>{shapeImgs[i]=img;loaded++;if(loaded===4){preprocessShapes();shapesReady=true;}};
    img.onerror=()=>{
      const c=document.createElement('canvas');c.width=100;c.height=100;
      const x=c.getContext('2d');
      const g=x.createRadialGradient(50,50,0,50,50,50);
      g.addColorStop(0,'white');g.addColorStop(1,'rgba(180,180,180,0)');
      x.fillStyle=g;x.beginPath();x.arc(50,50,50,0,Math.PI*2);x.fill();
      shapeImgs[i]=c;loaded++;if(loaded===4){preprocessShapes();shapesReady=true;}
    };
    img.src=src;
  });
}

function preprocessShapes(){
  const SZ=100;
  for(let i=0;i<4;i++){
    const result=document.createElement('canvas');result.width=SZ;result.height=SZ;
    const rc=result.getContext('2d');
    const tmp=document.createElement('canvas');tmp.width=SZ;tmp.height=SZ;
    const tc=tmp.getContext('2d');
    tc.drawImage(shapeImgs[i],0,0,SZ,SZ);
    const id=tc.getImageData(0,0,SZ,SZ);
    const px=id.data;
    for(let j=0;j<px.length;j+=4){
      const br=(px[j]+px[j+1]+px[j+2])/3;
      let a=255-br;a=Math.min(255,a*2.5);a=Math.max(0,a);
      px[j+3]=a;px[j]=255;px[j+1]=255;px[j+2]=255;
    }
    tc.putImageData(id,0,0);
    rc.drawImage(tmp,0,0);
    rc.globalCompositeOperation='source-atop';
    const g=rc.createRadialGradient(SZ/2,SZ/2,0,SZ/2,SZ/2,SZ/2);
    g.addColorStop(0,`rgb(${COL.center[0]},${COL.center[1]},${COL.center[2]})`);
    g.addColorStop(1,`rgb(${COL.edge[0]},${COL.edge[1]},${COL.edge[2]})`);
    rc.fillStyle=g;rc.fillRect(0,0,SZ,SZ);
    rc.globalCompositeOperation='source-over';
    coloredShapes[i]=result;
  }
}

function init(){
  resize();loadShapes();initFlowField();
  requestAnimationFrame(loop);
  setTimeout(()=>{showTyping();setTimeout(()=>showMessage(0),1100);},600);
  document.body.addEventListener('click',advance);
  document.body.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowRight')advance();});
  setTimeout(()=>document.getElementById('tapCue').classList.add('visible'),3000);
}
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  centerX=W/2;centerY=H/2;initFlowField();
}
window.addEventListener('resize',resize);
window.addEventListener('load',init);

function initFlowField(){
  flowCols=Math.ceil(W/FLOW_RES);flowRows=Math.ceil(H/FLOW_RES);
  flowField=new Array(flowCols*flowRows);updateFlowField();
}
function updateFlowField(){
  const t=time*0.002;
  for(let i=0;i<flowCols;i++)for(let j=0;j<flowRows;j++){
    const n=noise2D(i*0.08+t,j*0.08+t*0.5);
    const a=n*Math.PI*4;
    flowField[i+j*flowCols]={x:Math.cos(a),y:Math.sin(a)};
  }
}
function noise2D(x,y){const n=Math.sin(x*12.9898+y*78.233)*43758.5453;return n-Math.floor(n);}
function getFlow(x,y){
  const c=Math.max(0,Math.min(flowCols-1,Math.floor(x/FLOW_RES)));
  const r=Math.max(0,Math.min(flowRows-1,Math.floor(y/FLOW_RES)));
  return flowField[c+r*flowCols]||{x:0,y:0};
}

function lerp(a,b,t){return a+(b-a)*t;}

function loop(){
  time++;
  if(time%40===0)updateFlowField();
  const bR=lerp(254,70,bgDarkness*0.55);
  const bG=lerp(254,60,bgDarkness*0.55);
  const bB=lerp(254,55,bgDarkness*0.55);
  ctx.fillStyle=`rgb(${bR},${bG},${bB})`;
  ctx.fillRect(0,0,W,H);
  if(screenShake>0.3){ctx.save();ctx.translate((Math.random()-0.5)*screenShake*2,(Math.random()-0.5)*screenShake*2);screenShake*=0.91;}
  drawSmoke();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    applyBehavior(p,behaviorMode);updateP(p);drawP(p);
    if(p.dying&&p.life<=0)particles.splice(i,1);
  }
  if(screenShake>0.3)ctx.restore();
  if(currentMsg>=0&&currentMsg<SCRIPT.length-1){
    if(performance.now()-msgTimer>SCRIPT[currentMsg].delay)showMessage(currentMsg+1);
  }
  requestAnimationFrame(loop);
}

function drawSmoke(){
  for(let i=smokeTrails.length-1;i>=0;i--){
    const s=smokeTrails[i];s.life-=0.002;s.x+=s.vx;s.y+=s.vy;s.vx*=0.995;s.vy*=0.995;s.sz+=0.12;
    if(s.life<=0){smokeTrails.splice(i,1);continue;}
    ctx.fillStyle=`rgba(${COL.smoke[0]},${COL.smoke[1]},${COL.smoke[2]},${s.life*0.08})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,Math.PI*2);ctx.fill();
  }
}

function showTyping(){document.getElementById('typing').classList.add('visible');}
function hideTyping(){document.getElementById('typing').classList.remove('visible');}

function showMessage(idx){
  if(idx>=SCRIPT.length||idx<=currentMsg)return;
  hideTyping();currentMsg=idx;msgTimer=performance.now();
  const msg=SCRIPT[idx];
  const area=document.getElementById('messageArea');
  const typEl=document.getElementById('typing');
  const el=document.createElement('div');el.className='msg';
  el.innerHTML=`<div class="msg-text">${msg.text}</div>`;
  area.insertBefore(el,typEl);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('visible')));
  setTimeout(()=>{area.scrollTop=area.scrollHeight;},60);
  behaviorMode=msg.behavior;
  if(msg.particles>0)spawnParticles(msg.particles,msg.behavior);
  document.getElementById('legend').classList.toggle('visible',idx>=3&&idx<24);
  if(idx<SCRIPT.length-1)setTimeout(showTyping,Math.min(msg.delay*0.6,2500));
  else document.getElementById('tapCue').classList.remove('visible');
}

function advance(){if(currentMsg<SCRIPT.length-1)showMessage(currentMsg+1);}

function spawnParticles(count,beh){
  const avail=PLIMIT-particles.length;const n=Math.min(count,Math.max(0,avail));
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      let x,y;
      if(beh==='explosion'){x=centerX+(Math.random()-0.5)*40;y=centerY+(Math.random()-0.5)*40;}
      else{x=Math.random()*W*0.7+W*0.15;y=Math.random()*H*0.6+H*0.2;}
      const p=mkP(x,y);
      if(beh==='explosion'){const a=Math.random()*Math.PI*2;const s=2+Math.random()*6;p.vx=Math.cos(a)*s;p.vy=Math.sin(a)*s;}
      particles.push(p);
    },i*25);
  }
}

function mkP(x,y){
  return{x,y,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,ax:0,ay:0,
    type:'inference',mass:1,
    shape:Math.floor(Math.random()*4),
    size:20+Math.random()*28,
    opacity:0,tOpacity:1,scale:0.1,tScale:1,
    rot:Math.random()*Math.PI*2,rotS:(Math.random()-0.5)*0.012,
    cr:COL.center[0],cg:COL.center[1],cb:COL.center[2],
    tcr:COL.center[0],tcg:COL.center[1],tcb:COL.center[2],
    wAngle:Math.random()*Math.PI*2,
    bPhase:Math.random()*Math.PI*2,
    oAngle:Math.random()*Math.PI*2,
    escT:Math.random()*100,flickT:0,
    life:1,dying:false};
}

function updateP(p){
  p.opacity+=(p.tOpacity-p.opacity)*0.05;
  p.scale+=(p.tScale-p.scale)*0.07;
  p.cr+=(p.tcr-p.cr)*0.03;p.cg+=(p.tcg-p.cg)*0.03;p.cb+=(p.tcb-p.cb)*0.03;
  p.vx+=p.ax;p.vy+=p.ay;
  const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
  if(spd>5){p.vx*=5/spd;p.vy*=5/spd;}
  p.x+=p.vx;p.y+=p.vy;p.ax=0;p.ay=0;
  p.vx*=0.99;p.vy*=0.99;p.rot+=p.rotS;
  const m=70;
  if(p.x<-m)p.x=W+m;if(p.x>W+m)p.x=-m;
  if(p.y<-m)p.y=H+m;if(p.y>H+m)p.y=-m;
}

function drawP(p){
  if(p.opacity<0.01)return;
  const s=p.size*p.scale;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.opacity;
  if(shapesReady&&coloredShapes[p.shape]){
    if(p.type!=='inference'){
      offC.width=100;offC.height=100;offX.clearRect(0,0,100,100);
      offX.drawImage(coloredShapes[p.shape],0,0);
      offX.globalCompositeOperation='source-atop';
      const g=offX.createRadialGradient(50,50,0,50,50,50);
      g.addColorStop(0,`rgb(${Math.round(p.cr)},${Math.round(p.cg)},${Math.round(p.cb)})`);
      g.addColorStop(1,`rgb(${Math.round(p.cr*0.6)},${Math.round(p.cg*0.6)},${Math.round(p.cb*0.6)})`);
      offX.fillStyle=g;offX.fillRect(0,0,100,100);
      offX.globalCompositeOperation='source-over';
      ctx.drawImage(offC,-s/2,-s/2,s,s);
    }else{
      ctx.drawImage(coloredShapes[p.shape],-s/2,-s/2,s,s);
    }
  }else{
    const g=ctx.createRadialGradient(0,0,0,0,0,s/2);
    g.addColorStop(0,`rgba(${Math.round(p.cr)},${Math.round(p.cg)},${Math.round(p.cb)},0.9)`);
    g.addColorStop(0.6,`rgba(${COL.edge[0]},${COL.edge[1]},${COL.edge[2]},0.6)`);
    g.addColorStop(1,`rgba(${COL.edge[0]},${COL.edge[1]},${COL.edge[2]},0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s/2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function aF(p,fx,fy){p.ax+=fx/p.mass;p.ay+=fy/p.mass;}
function wander(p,str){p.wAngle+=(Math.random()-0.5)*0.6;aF(p,Math.cos(p.wAngle)*str,Math.sin(p.wAngle)*str);}
function sep(p,others,rad){
  let sx=0,sy=0,c=0;
  for(const o of others){if(o===p)continue;const dx=p.x-o.x,dy=p.y-o.y;const d=Math.sqrt(dx*dx+dy*dy);
    if(d<rad&&d>0){sx+=dx/(d*d);sy+=dy/(d*d);c++;}}
  if(c>0){sx/=c;sy/=c;const m=Math.sqrt(sx*sx+sy*sy);if(m>0){sx=sx/m*0.1;sy=sy/m*0.1;}}
  return{x:sx,y:sy};
}
function alignF(p,others,rad){
  let ax=0,ay=0,c=0;
  for(const o of others){if(o===p)continue;const d=Math.sqrt((p.x-o.x)**2+(p.y-o.y)**2);
    if(d<rad){ax+=o.vx;ay+=o.vy;c++;}}
  if(c>0){ax/=c;ay/=c;const m=Math.sqrt(ax*ax+ay*ay)||1;ax=ax/m*2-p.vx;ay=ay/m*2-p.vy;
    const sm=Math.sqrt(ax*ax+ay*ay);if(sm>0.08){ax*=0.08/sm;ay*=0.08/sm;}}
  return{x:ax,y:ay};
}
function cohere(p,others,rad){
  let cx=0,cy=0,c=0;
  for(const o of others){if(o===p)continue;const d=Math.sqrt((p.x-o.x)**2+(p.y-o.y)**2);
    if(d<rad){cx+=o.x;cy+=o.y;c++;}}
  if(c>0){cx=cx/c-p.x;cy=cy/c-p.y;const m=Math.sqrt(cx*cx+cy*cy)||1;
    cx=cx/m*2-p.vx;cy=cy/m*2-p.vy;
    const sm=Math.sqrt(cx*cx+cy*cy);if(sm>0.05){cx*=0.05/sm;cy*=0.05/sm;}}
  return{x:cx,y:cy};
}

function spawnChild(pp){
  const a=Math.random()*Math.PI*2,ox=Math.cos(a)*20,oy=Math.sin(a)*20;
  const c=mkP(pp.x+ox,pp.y+oy);c.size=pp.size*0.75;c.type=pp.type;
  c.cr=pp.cr;c.cg=pp.cg;c.cb=pp.cb;c.tcr=pp.tcr;c.tcg=pp.tcg;c.tcb=pp.tcb;c.mass=pp.mass;
  particles.push(c);aF(pp,-ox*0.02,-oy*0.02);
}

function applyBehavior(p,mode){
  switch(mode){
    case 'alive':case 'breathe':
      p.bPhase+=0.025;p.tScale=1+Math.sin(p.bPhase)*0.12;wander(p,0.02);break;
    case 'curious':{
      const dx=mX-p.x,dy=mY-p.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>40){const mag=Math.min(2.5,d*0.003);aF(p,dx/d*mag*0.04,dy/d*mag*0.04);}
      aF(p,-dy*0.0003,dx*0.0003);p.bPhase+=0.03;p.tScale=1+Math.sin(p.bPhase)*0.08;break;}
    case 'happy':
      aF(p,0,-0.035);if(p.y<H*0.2){p.vy*=-0.6;aF(p,0,0.15);}
      if(p.y>H*0.85){p.vy*=-0.7;aF(p,0,-0.6);}
      wander(p,0.1);p.bPhase+=0.04;p.tScale=1+Math.abs(Math.sin(p.bPhase))*0.15;break;
    case 'multiply':case 'growing':
      wander(p,0.04);p.bPhase+=0.015;p.tScale=1+Math.sin(p.bPhase)*0.06;break;
    case 'drift':{const ff=getFlow(p.x,p.y);aF(p,ff.x*0.12,ff.y*0.12);p.vx*=0.985;p.vy*=0.985;break;}
    case 'pause':p.vx*=0.93;p.vy*=0.93;p.bPhase+=0.01;p.tScale=1+Math.sin(p.bPhase)*0.04;break;
    case 'explosion':p.vx*=0.97;p.vy*=0.97;if(Math.sqrt(p.vx**2+p.vy**2)<0.8)wander(p,0.03);break;
    case 'crowding':{const s=sep(p,particles,55);aF(p,s.x*15,s.y*15);wander(p,0.02);break;}
    case 'tension':{
      const dx=centerX-p.x,dy=centerY-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      aF(p,dx/d*0.12,dy/d*0.12);p.vx*=0.96;p.vy*=0.96;p.tScale=0.85;break;}
    case 'split_grid':
      if(p.type==='inference'){p.type=Math.random()<DATA.fossil_pct?'fossil':'renewable';
        if(p.type==='fossil'){p.tcr=COL.fossil[0];p.tcg=COL.fossil[1];p.tcb=COL.fossil[2];p.mass=2.8;}
        else{p.tcr=COL.renewable[0];p.tcg=COL.renewable[1];p.tcb=COL.renewable[2];p.mass=0.5;}}
      aF(p,0,p.type==='fossil'?0.05:-0.035);
      if(p.type==='fossil'&&p.y<H*0.5)aF(p,0,0.025);
      if(p.type==='renewable'&&p.y>H*0.5)aF(p,0,-0.025);
      wander(p,0.015);p.vx*=0.97;p.vy*=0.97;break;
    case 'heavy':
      aF(p,0,0.025*p.mass);p.vx*=0.95;p.vy*=0.95;
      if(p.y>H-50){p.y=H-50;p.vy*=-0.25;}break;
    case 'trapped':{
      const dx=centerX-p.x,dy=centerY-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const grav=Math.min(0.25,600/(d*d+80));
      aF(p,dx/d*grav,dy/d*grav);aF(p,-dy/d*0.4,dx/d*0.4);
      p.escT+=0.01;if(Math.sin(p.escT*3+p.oAngle)>0.92)aF(p,-dx/d*0.2,-dy/d*0.2);
      p.vx*=0.985;p.vy*=0.985;break;}
    case 'suffocate':case 'smoke':{
      const ff=getFlow(p.x,p.y);aF(p,ff.x*0.06,ff.y*0.06);
      if(time%5===0)smokeTrails.push({x:p.x+(Math.random()-0.5)*8,y:p.y+(Math.random()-0.5)*8,vx:(Math.random()-0.5)*0.3,vy:-0.1-Math.random()*0.4,sz:10+Math.random()*18,life:1});
      bgDarkness=Math.min(bgDarkness+0.0002,0.45);p.vx*=0.965;p.vy*=0.965;
      p.tScale=Math.max(0.6,p.tScale-0.0008);break;}
    case 'multiply_fast':
      wander(p,0.07);if(Math.random()<0.006&&particles.length<PLIMIT)spawnChild(p);
      p.bPhase+=0.04;p.tScale=1+Math.sin(p.bPhase)*0.1;break;
    case 'chaos':case 'desperate':
      aF(p,(Math.random()-0.5)*0.35,(Math.random()-0.5)*0.35);
      {const s=sep(p,particles,30);aF(p,s.x*18,s.y*18);}
      if(Math.random()<0.004&&particles.length<PLIMIT)spawnChild(p);
      screenShake=Math.max(screenShake,2);break;
    case 'organize':{
      const cs=48;const tx=Math.round(p.x/cs)*cs,ty=Math.round(p.y/cs)*cs;
      aF(p,(tx-p.x)*0.015,(ty-p.y)*0.015);p.vx*=0.94;p.vy*=0.94;
      p.tcr=COL.center[0];p.tcg=COL.center[1];p.tcb=COL.center[2];
      p.mass=1;p.type='inference';bgDarkness=Math.max(0,bgDarkness-0.004);break;}
    case 'flock':case 'unity':{
      const al=alignF(p,particles,55),co=cohere(p,particles,90),se=sep(p,particles,30);
      aF(p,al.x*12+co.x*9+se.x*16,al.y*12+co.y*9+se.y*16);
      bgDarkness=Math.max(0,bgDarkness-0.003);break;}
    case 'dying':
      p.dying=true;aF(p,0,0.035);p.flickT+=0.05;
      if(Math.sin(p.flickT*5+p.bPhase)>0.7){aF(p,0,-0.12);p.tOpacity=0.75;}
      else p.tOpacity=Math.max(0.1,p.tOpacity-0.003);
      p.tcr=lerp(p.tcr,130,0.008);p.tcg=lerp(p.tcg,120,0.008);p.tcb=lerp(p.tcb,110,0.008);
      p.life-=0.0015;p.vx*=0.97;p.vy*=0.97;break;
    case 'settle':{
      const dx=centerX-p.x,dy=centerY-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      aF(p,dx/d*0.3,dy/d*0.3);p.vx*=0.92;p.vy*=0.92;
      p.tcr=COL.center[0];p.tcg=COL.center[1];p.tcb=COL.center[2];
      p.dying=false;p.tOpacity=1;p.life=1;bgDarkness=Math.max(0,bgDarkness-0.006);break;}
    case 'breathe_sync':case 'waiting':{
      const sp=time*0.02;p.tScale=1+Math.sin(sp)*0.18;
      const dx=centerX-p.x,dy=centerY-p.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>140)aF(p,dx*0.0003,dy*0.0003);
      aF(p,Math.sin(sp*0.7)*0.008,Math.cos(sp*0.5)*0.008);
      p.vx*=0.95;p.vy*=0.95;
      p.tcr=COL.center[0];p.tcg=COL.center[1];p.tcb=COL.center[2];
      p.tOpacity=1;p.dying=false;p.life=1;bgDarkness=Math.max(0,bgDarkness-0.008);break;}
    default:wander(p,0.03);
  }
}
